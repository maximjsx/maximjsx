name: Jeevacation Boarding

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — New issue opened
  # ─────────────────────────────────────────────
  board-passenger:
    if: github.event_name == 'issues' && startsWith(github.event.issue.title, 'Jeevacation')
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Validate title
      run: |
        if [ "${{ github.event.issue.title }}" = "Jeevacation" ]; then
          echo "VALID=true" >> $GITHUB_ENV
        else
          echo "VALID=false" >> $GITHUB_ENV
        fi

    - name: Reject tampered title
      if: env.VALID == 'false'
      run: |
        curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d '{"body":"## ⚠️ Application Rejected\n\nIssue title was modified. Please close this and resubmit with the exact title `Jeevacation`."}' \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments"
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}" \
          -d '{"state":"closed","state_reason":"not_planned"}'

    - name: Post initial loading comment
      if: env.VALID == 'true'
      run: |
        RESP=$(curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d '{"body":"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=3000&pause=99999&color=33793d&vCenter=true&repeat=false&width=500&height=40&lines=Receiving+application...)"}' \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments")
        echo "COMMENT_ID=$(echo $RESP | jq -r .id)" >> $GITHUB_ENV

    - name: Update — connecting
      if: env.VALID == 'true'
      run: |
        sleep 4
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"body\":\"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=3000&pause=99999&color=33793d&vCenter=true&repeat=false&width=500&height=40&lines=Connecting+to+VI-032...)\n\n\`\`\`\nVI-032 SECURE TERMINAL — L.S.J. LLC\nEstablishing encrypted connection ...\nHandshake with US-VIRGIN-ISLANDS-032 ... OK\nAuthenticating session ... OK\n\`\`\`\"}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments/${{ env.COMMENT_ID }}"

    - name: Update — identity lookup
      if: env.VALID == 'true'
      run: |
        sleep 4
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"body\":\"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=3000&pause=99999&color=33793d&vCenter=true&repeat=false&width=500&height=40&lines=Retrieving+identity+record...)\n\n\`\`\`\nVI-032 SECURE TERMINAL — L.S.J. LLC\nEstablishing encrypted connection ... OK\nQuerying passenger manifest ...\nRetrieving identity record for: ${{ github.actor }} ...\nCross-referencing with Aviloop flight logs LOWW → TIST ...\n\`\`\`\"}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments/${{ env.COMMENT_ID }}"

    - name: Check duplicate
      if: env.VALID == 'true'
      run: |
        if grep -q "\[${{ github.actor }}\]" README.md; then
          echo "DUPLICATE=true" >> $GITHUB_ENV
        else
          echo "DUPLICATE=false" >> $GITHUB_ENV
        fi

    - name: Update — background check
      if: env.VALID == 'true' && env.DUPLICATE == 'false'
      run: |
        sleep 4
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"body\":\"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=3000&pause=99999&color=33793d&vCenter=true&repeat=false&width=500&height=40&lines=Running+background+check...)\n\n\`\`\`\nVI-032 SECURE TERMINAL — L.S.J. LLC\nEstablishing encrypted connection ... OK\nIdentity confirmed: ${{ github.actor }}\nChecking prior bookings ... NONE FOUND\nVerifying clearance level ...\nPinging Aviloop flight reservation system ...\nSeat allocation in progress ...\n\`\`\`\"}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments/${{ env.COMMENT_ID }}"

    # ── DUPLICATE PATH ──────────────────────────────────────────────────────

    - name: Update — duplicate found
      if: env.VALID == 'true' && env.DUPLICATE == 'true'
      run: |
        sleep 4
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"body\":\"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=3000&pause=99999&color=e0a000&vCenter=true&repeat=false&width=500&height=40&lines=Passenger+already+on+manifest.)\n\n\`\`\`\nVI-032 SECURE TERMINAL — L.S.J. LLC\nIdentity confirmed: ${{ github.actor }}\nChecking prior bookings ... EXISTING RECORD FOUND\nDuplicate application rejected.\n\`\`\`\n\n---\n\n> ✅ You are already on the manifest. No need to reapply.\n\n---\n\n### Not a VIP yet?\n\nIf you have an **exclusive access code**, drop it as a comment below.\nYou will be upgraded to **⭐ VIP Guest** status with access to the island parties.\n\n> _This issue closes automatically in 2 minutes._\"}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments/${{ env.COMMENT_ID }}"

    - name: Wait for code — duplicate
      if: env.VALID == 'true' && env.DUPLICATE == 'true'
      run: sleep 120

    - name: Close duplicate issue
      if: env.VALID == 'true' && env.DUPLICATE == 'true'
      run: |
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}" \
          -d '{"state":"closed","state_reason":"completed"}'

    # ── FRESH PASSENGER PATH ────────────────────────────────────────────────

    - name: Generate boarding data
      if: env.VALID == 'true' && env.DUPLICATE == 'false'
      run: |
        SEAT_NUM=$((RANDOM % 28 + 8))
        ROWS=("A" "B" "C" "D" "F")
        SEAT_ROW=${ROWS[$((RANDOM % 5))]}
        TICKET="LSJ-$(date +%Y%m%d)-$(cat /dev/urandom | tr -dc 'A-Z0-9' | head -c 6; echo)"
        echo "SEAT=${SEAT_NUM}${SEAT_ROW}" >> $GITHUB_ENV
        echo "TICKET=$TICKET" >> $GITHUB_ENV
        echo "USER_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV
        echo "USER_AVATAR=https://avatars.githubusercontent.com/${{ github.actor }}" >> $GITHUB_ENV

    - name: Add user to README
      if: env.VALID == 'true' && env.DUPLICATE == 'false'
      run: |
        git config --local user.name "github-actions"
        git config --local user.email "github-actions@github.com"

        NEW_ROW="| [${{ github.actor }}](https://github.com/${{ github.actor }}) | <img src=\"${{ env.USER_AVATAR }}\" width=\"30\" height=\"30\" /> | ${{ env.USER_DATE }} |"

        update_readme() {
          awk -v new_row="$NEW_ROW" '
          BEGIN { inside=0; header=0; count=0 }
          /<!--START_SECTION:users-->/ {
            print; inside=1
            if (!header) {
              print "| Name | Picture | Date |"
              print "| ---- | ------- | ---- |"
              header=1
            }
            print new_row; next
          }
          inside && /^\|.*\|.*\|.*\|$/ && !/\| Name \|/ && !/\| ---- \|/ {
            count++
            if (count <= 2) print
            next
          }
          /<!--END_SECTION:users-->/ { print; inside=0; next }
          { print }
          ' README.md > README.tmp && mv README.tmp README.md
        }

        for i in {1..3}; do
          git reset --hard; git clean -fd
          git fetch origin main; git reset --hard origin/main
          update_readme
          git add README.md
          git commit -m "Add ${{ github.actor }} to manifest"
          git push && exit 0
          sleep $((i * 2))
        done
        exit 1

    - name: Post boarding pass
      if: env.VALID == 'true' && env.DUPLICATE == 'false'
      run: |
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"body\":\"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=3000&pause=99999&color=33793d&vCenter=true&repeat=false&width=500&height=40&lines=Clearance+approved.+Issuing+boarding+pass...)\n\n\`\`\`\nVI-032 SECURE TERMINAL — L.S.J. LLC\nBackground check .............. PASSED\nFlight reservation ............. CONFIRMED\nSeat allocated ................. ${{ env.SEAT }}\nClearance level ................ STANDARD\n\`\`\`\n\n---\n\n\`\`\`\n╔══════════════════════════════════════════════╗\n║   ✈  JEEVACATION AIR  ·  FLIGHT VI-032      ║\n╠══════════════════════════════════════════════╣\n║   PASSENGER  :  ${{ github.actor }}\n║   FROM       :  LOWW   Vienna Intl.          ║\n║   TO         :  TIST   Little St. Jeff       ║\n║   SEAT       :  ${{ env.SEAT }}                              ║\n║   CLASS      :  STANDARD                     ║\n║   PILOT      :  Nadia Marcinko               ║\n║   OPERATED   :  Aviloop Charter Services     ║\n║   TICKET ID  :  ${{ env.TICKET }}              ║\n╚══════════════════════════════════════════════╝\n\`\`\`\n\n🏝️ You have been added to the manifest. Mr. Epstein has been notified.\n\n---\n\n### Got a promo code?\n\nIf you have an **exclusive access code**, drop it as a comment right here and you will be upgraded to **⭐ VIP Guest** status with access to the island parties. 🎉\n\nNo code? No worries — your booking is confirmed as-is.\n\n> _This issue closes in 2 minutes._\"}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments/${{ env.COMMENT_ID }}"

    - name: Wait then close
      if: env.VALID == 'true' && env.DUPLICATE == 'false'
      run: |
        sleep 120
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}" \
          -d '{"state":"closed","state_reason":"completed"}'

  # ─────────────────────────────────────────────
  # JOB 2 — Someone comments a code (open or closed issue)
  # ─────────────────────────────────────────────
  check-promo-code:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Check code
      run: |
        SECRET_CODE="LSJ1998"
        COMMENT="${{ github.event.comment.body }}"
        if echo "$COMMENT" | grep -qi "$SECRET_CODE"; then
          echo "CODE_VALID=true" >> $GITHUB_ENV
        else
          echo "CODE_VALID=false" >> $GITHUB_ENV
        fi

    - name: Check manifest and VIP status
      if: env.CODE_VALID == 'true'
      run: |
        USER="${{ github.event.comment.user.login }}"
        if grep -q "\[${USER}\]" README.md; then
          echo "ON_MANIFEST=true" >> $GITHUB_ENV
        else
          echo "ON_MANIFEST=false" >> $GITHUB_ENV
        fi
        if grep -q "⭐ \[${USER}\]" README.md; then
          echo "ALREADY_VIP=true" >> $GITHUB_ENV
        else
          echo "ALREADY_VIP=false" >> $GITHUB_ENV
        fi

    - name: Reply — not on manifest
      if: env.CODE_VALID == 'true' && env.ON_MANIFEST == 'false'
      run: |
        curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d '{"body":"## ⚠️ Code Accepted — But You Are Not on the Manifest\n\nPlease apply first by opening an issue titled exactly `Jeevacation`.\nOnce added, you can redeem your code at any time."}' \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments"

    - name: Reply — already VIP
      if: env.CODE_VALID == 'true' && env.ON_MANIFEST == 'true' && env.ALREADY_VIP == 'true'
      run: |
        curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d '{"body":"✨ You are already a **⭐ VIP Guest**. See you at the party."}' \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments"

    - name: Post upgrading comment
      if: env.CODE_VALID == 'true' && env.ON_MANIFEST == 'true' && env.ALREADY_VIP == 'false'
      run: |
        RESP=$(curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"body\":\"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=3000&pause=99999&color=c0a000&vCenter=true&repeat=false&width=500&height=40&lines=Verifying+access+code...)\"}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments")
        echo "VIP_COMMENT_ID=$(echo $RESP | jq -r .id)" >> $GITHUB_ENV

    - name: Upgrade README to VIP
      if: env.CODE_VALID == 'true' && env.ON_MANIFEST == 'true' && env.ALREADY_VIP == 'false'
      run: |
        git config --local user.name "github-actions"
        git config --local user.email "github-actions@github.com"
        USER="${{ github.event.comment.user.login }}"

        upgrade_readme() {
          sed -i "s/\[${USER}\]/⭐ [${USER}]/" README.md
        }

        for i in {1..3}; do
          git reset --hard; git clean -fd
          git fetch origin main; git reset --hard origin/main
          upgrade_readme
          git add README.md
          git commit -m "Upgrade ${USER} to VIP"
          git push && exit 0
          sleep $((i * 2))
        done
        exit 1

    - name: Post VIP granted comment
      if: env.CODE_VALID == 'true' && env.ON_MANIFEST == 'true' && env.ALREADY_VIP == 'false'
      run: |
        sleep 3
        VIP_TICKET="LSJ-VIP-$(cat /dev/urandom | tr -dc 'A-Z0-9' | head -c 6; echo)"
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"body\":\"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=4000&pause=99999&color=c0a000&vCenter=true&repeat=false&width=600&height=40&lines=VIP+Access+Granted.+Welcome+aboard.)\n\n\`\`\`\nVI-032 SECURE TERMINAL — L.S.J. LLC\nPromo code ..................... VERIFIED\nUpgrading passenger ${{ github.event.comment.user.login }} ...\nClearance level ................ ⭐ VIP GUEST\nAccess ......................... Island Parties · Deck B · Private Beach\nNew ticket ID .................. $VIP_TICKET\n\`\`\`\n\n---\n\n🌟 You have been upgraded on the manifest. See you at the party.\"}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments/${{ env.VIP_COMMENT_ID }}"
