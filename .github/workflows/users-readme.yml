name: Jeevacation Boarding

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # JOB 1 вЂ” New issue opened
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  board-passenger:
    if: github.event_name == 'issues' && startsWith(github.event.issue.title, 'Jeevacation')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Validate title
      run: |
        if [ "${{ github.event.issue.title }}" = "Jeevacation" ]; then
          echo "VALID=true" >> $GITHUB_ENV
        else
          echo "VALID=false" >> $GITHUB_ENV
        fi

    - name: Reject tampered title
      if: env.VALID == 'false'
      run: |
        curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d '{"body":"## вљ пёЏ Application Rejected\n\nIssue title was modified. Please close this and resubmit with the exact title `Jeevacation`."}' \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments"
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}" \
          -d '{"state":"closed","state_reason":"not_planned"}'

    - name: Post initial loading comment
      if: env.VALID == 'true'
      run: |
        RESP=$(curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d '{"body":"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=3000&pause=99999&color=33793d&vCenter=true&repeat=false&width=500&height=40&lines=Receiving+application...)"}' \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments")
        COMMENT_ID=$(echo $RESP | jq -r .id)
        echo "COMMENT_ID=$COMMENT_ID" >> $GITHUB_ENV
        echo "$COMMENT_ID" > /tmp/comment_id
        echo "Debug: COMMENT_ID=$COMMENT_ID"

    - name: Update вЂ” connecting
      if: env.VALID == 'true'
      run: |
        COMMENT_ID=$(cat /tmp/comment_id)
        echo "Debug: using COMMENT_ID=$COMMENT_ID"
        sleep 4
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"body\":\"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=3000&pause=99999&color=33793d&vCenter=true&repeat=false&width=500&height=40&lines=Connecting+to+VI-032...)\n\n\`\`\`\nVI-032 SECURE TERMINAL вЂ” L.S.J. LLC\nEstablishing encrypted connection ...\nHandshake with US-VIRGIN-ISLANDS-032 ... OK\nAuthenticating session ... OK\n\`\`\`\"}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments/${COMMENT_ID}"

    - name: Update вЂ” identity lookup
      if: env.VALID == 'true'
      run: |
        COMMENT_ID=$(cat /tmp/comment_id)
        sleep 4
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"body\":\"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=3000&pause=99999&color=33793d&vCenter=true&repeat=false&width=500&height=40&lines=Retrieving+identity+record...)\n\n\`\`\`\nVI-032 SECURE TERMINAL вЂ” L.S.J. LLC\nEstablishing encrypted connection ... OK\nQuerying passenger manifest ...\nRetrieving identity record for: ${{ github.actor }} ...\nCross-referencing with Aviloop flight logs LOWW в†’ TIST ...\n\`\`\`\"}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments/${COMMENT_ID}"

    - name: Check duplicate
      if: env.VALID == 'true'
      run: |
        if grep -q "\[${{ github.actor }}\]" README.md; then
          echo "DUPLICATE=true" >> $GITHUB_ENV
        else
          echo "DUPLICATE=false" >> $GITHUB_ENV
        fi

    - name: Update вЂ” background check
      if: env.VALID == 'true' && env.DUPLICATE == 'false'
      run: |
        COMMENT_ID=$(cat /tmp/comment_id)
        sleep 4
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"body\":\"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=3000&pause=99999&color=33793d&vCenter=true&repeat=false&width=500&height=40&lines=Running+background+check...)\n\n\`\`\`\nVI-032 SECURE TERMINAL вЂ” L.S.J. LLC\nEstablishing encrypted connection ... OK\nIdentity confirmed: ${{ github.actor }}\nChecking prior bookings ... NONE FOUND\nVerifying clearance level ...\nPinging Aviloop flight reservation system ...\nSeat allocation in progress ...\n\`\`\`\"}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments/${COMMENT_ID}"

    # в”Ђв”Ђ DUPLICATE PATH в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

    - name: Update вЂ” duplicate found
      if: env.VALID == 'true' && env.DUPLICATE == 'true'
      run: |
        COMMENT_ID=$(cat /tmp/comment_id)
        sleep 4
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"body\":\"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=3000&pause=99999&color=e0a000&vCenter=true&repeat=false&width=500&height=40&lines=Passenger+already+on+manifest.)\n\n\`\`\`\nVI-032 SECURE TERMINAL вЂ” L.S.J. LLC\nIdentity confirmed: ${{ github.actor }}\nChecking prior bookings ... EXISTING RECORD FOUND\nDuplicate application rejected.\n\`\`\`\n\n---\n\n> вњ… You are already on the manifest. No need to reapply.\n\n---\n\n### Not a VIP yet?\n\nIf you have an **exclusive access code**, drop it as a comment below.\nYou will be upgraded to **в­ђ VIP Guest** status with access to the island parties.\n\n> _This issue closes automatically in 2 minutes._\"}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments/${COMMENT_ID}"

    - name: Wait for code вЂ” duplicate
      if: env.VALID == 'true' && env.DUPLICATE == 'true'
      run: sleep 120

    - name: Close duplicate issue
      if: env.VALID == 'true' && env.DUPLICATE == 'true'
      run: |
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}" \
          -d '{"state":"closed","state_reason":"completed"}'

    # в”Ђв”Ђ FRESH PASSENGER PATH в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

    - name: Generate boarding data
      if: env.VALID == 'true' && env.DUPLICATE == 'false'
      run: |
        SEAT_NUM=$((RANDOM % 28 + 8))
        ROWS=("A" "B" "C" "D" "F")
        SEAT_ROW=${ROWS[$((RANDOM % 5))]}
        RAND=$(openssl rand -base64 12 | tr -dc 'A-Z0-9' | head -c 6)
        TICKET="LSJ-$(date +%Y%m%d)-${RAND}"
        echo "SEAT=${SEAT_NUM}${SEAT_ROW}" >> $GITHUB_ENV
        echo "TICKET=$TICKET" >> $GITHUB_ENV
        echo "USER_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV
        echo "USER_AVATAR=https://avatars.githubusercontent.com/${{ github.actor }}" >> $GITHUB_ENV

    - name: Add user to README
      if: env.VALID == 'true' && env.DUPLICATE == 'false'
      run: |
        git config --local user.name "github-actions"
        git config --local user.email "github-actions@github.com"

        NEW_ROW="| [${{ github.actor }}](https://github.com/${{ github.actor }}) | <img src=\"${{ env.USER_AVATAR }}\" width=\"30\" height=\"30\" /> | ${{ env.USER_DATE }} |"

        update_readme() {
          awk -v new_row="$NEW_ROW" '
          BEGIN {
            inside_users=0; inside_old=0
            header_users=0; header_old=0
            user_count=0; overflow=""
          }

          /<!--START_SECTION:users-->/ {
            print; inside_users=1
            if (!header_users) {
              print "| Name | Picture | Date |"
              print "| ---- | ---------------- | ---- |"
              header_users=1
            }
            print new_row; next
          }

          inside_users && /^\|.*\|.*\|.*\|$/ && !/\| Name \|/ && !/\| ---- \|/ {
            user_count++
            if (user_count <= 2) print
            else if (overflow == "") overflow=$0
            next
          }

          /<!--END_SECTION:users-->/ {
            print; inside_users=0; next
          }

          /<!--START_SECTION:old_users-->/ {
            print; inside_old=1
            print "| Name | Picture | Date |"
            print "| ---- | ---------------- | ---- |"
            if (overflow != "") print overflow
            next
          }

          inside_old && /^\|.*\|.*\|.*\|$/ && !/\| Name \|/ && !/\| ---- \|/ {
            print; next
          }

          /<!--END_SECTION:old_users-->/ {
            print; inside_old=0; next
          }

          !/\| Name \|/ && !/\| ---- \|/ { print }
          ' README.md > README.tmp && mv README.tmp README.md
        }

        for i in {1..3}; do
          git reset --hard; git clean -fd
          git fetch origin main; git reset --hard origin/main
          update_readme
          git add README.md
          git commit -m "Add ${{ github.actor }} to manifest"
          git push && exit 0
          sleep $((i * 2))
        done
        exit 1

    - name: Post boarding pass
      if: env.VALID == 'true' && env.DUPLICATE == 'false'
      run: |
        COMMENT_ID=$(cat /tmp/comment_id)
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"body\":\"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=3000&pause=99999&color=33793d&vCenter=true&repeat=false&width=500&height=40&lines=Clearance+approved.+Issuing+boarding+pass...)\n\n\`\`\`\nVI-032 SECURE TERMINAL вЂ” L.S.J. LLC\nBackground check .............. PASSED\nFlight reservation ............. CONFIRMED\nSeat allocated ................. ${{ env.SEAT }}\nClearance level ................ STANDARD\n\`\`\`\n\n---\n\n\`\`\`\nв•”в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•—\nв•‘   вњ€  JEEVACATION AIR  В·  FLIGHT VI-032      в•‘\nв• в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•Ј\nв•‘   PASSENGER  :  ${{ github.actor }}\nв•‘   FROM       :  LOWW   Vienna Intl.          в•‘\nв•‘   TO         :  TIST   Little St. Jeff       в•‘\nв•‘   SEAT       :  ${{ env.SEAT }}                              в•‘\nв•‘   CLASS      :  STANDARD                     в•‘\nв•‘   PILOT      :  Nadia Marcinko               в•‘\nв•‘   OPERATED   :  Aviloop Charter Services     в•‘\nв•‘   TICKET ID  :  ${{ env.TICKET }}              в•‘\nв•љв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ќ\n\`\`\`\n\nрџЏќпёЏ You have been added to the manifest. Mr. Epstein has been notified.\n\n---\n\n### Got a promo code?\n\nIf you have an **exclusive access code**, drop it as a comment right here and you will be upgraded to **в­ђ VIP Guest** status with access to the island parties. рџЋ‰\n\nNo code? No worries вЂ” your booking is confirmed as-is.\n\n> _This issue closes in 2 minutes._\"}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments/${COMMENT_ID}"

    - name: Wait then close
      if: env.VALID == 'true' && env.DUPLICATE == 'false'
      run: |
        sleep 120
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}" \
          -d '{"state":"closed","state_reason":"completed"}'

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # JOB 2 вЂ” Someone comments a code (open or closed issue)
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  check-promo-code:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Check code
      run: |
        SECRET_CODE="LSJ1998"
        COMMENT="${{ github.event.comment.body }}"
        if echo "$COMMENT" | grep -qi "$SECRET_CODE"; then
          echo "CODE_VALID=true" >> $GITHUB_ENV
        else
          echo "CODE_VALID=false" >> $GITHUB_ENV
        fi

    - name: Check manifest and VIP status
      if: env.CODE_VALID == 'true'
      run: |
        USER="${{ github.event.comment.user.login }}"
        if grep -q "\[${USER}\]" README.md; then
          echo "ON_MANIFEST=true" >> $GITHUB_ENV
        else
          echo "ON_MANIFEST=false" >> $GITHUB_ENV
        fi
        if grep -q "в­ђ \[${USER}\]" README.md; then
          echo "ALREADY_VIP=true" >> $GITHUB_ENV
        else
          echo "ALREADY_VIP=false" >> $GITHUB_ENV
        fi

    - name: Reply вЂ” not on manifest
      if: env.CODE_VALID == 'true' && env.ON_MANIFEST == 'false'
      run: |
        curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d '{"body":"## вљ пёЏ Code Accepted вЂ” But You Are Not on the Manifest\n\nPlease apply first by opening an issue titled exactly `Jeevacation`.\nOnce added, you can redeem your code at any time."}' \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments"

    - name: Reply вЂ” already VIP
      if: env.CODE_VALID == 'true' && env.ON_MANIFEST == 'true' && env.ALREADY_VIP == 'true'
      run: |
        curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d '{"body":"вњЁ You are already a **в­ђ VIP Guest**. See you at the party."}' \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments"

    - name: Post upgrading comment
      if: env.CODE_VALID == 'true' && env.ON_MANIFEST == 'true' && env.ALREADY_VIP == 'false'
      run: |
        RESP=$(curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"body\":\"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=3000&pause=99999&color=c0a000&vCenter=true&repeat=false&width=500&height=40&lines=Verifying+access+code...)\"}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments")
        VIP_COMMENT_ID=$(echo $RESP | jq -r .id)
        echo "VIP_COMMENT_ID=$VIP_COMMENT_ID" >> $GITHUB_ENV
        echo "$VIP_COMMENT_ID" > /tmp/vip_comment_id

    - name: Upgrade README to VIP
      if: env.CODE_VALID == 'true' && env.ON_MANIFEST == 'true' && env.ALREADY_VIP == 'false'
      run: |
        git config --local user.name "github-actions"
        git config --local user.email "github-actions@github.com"
        USER="${{ github.event.comment.user.login }}"

        upgrade_readme() {
          sed -i "s/\[${USER}\]/в­ђ [${USER}]/" README.md
        }

        for i in {1..3}; do
          git reset --hard; git clean -fd
          git fetch origin main; git reset --hard origin/main
          upgrade_readme
          git add README.md
          git commit -m "Upgrade ${USER} to VIP"
          git push && exit 0
          sleep $((i * 2))
        done
        exit 1

    - name: Post VIP granted comment
      if: env.CODE_VALID == 'true' && env.ON_MANIFEST == 'true' && env.ALREADY_VIP == 'false'
      run: |
        VIP_COMMENT_ID=$(cat /tmp/vip_comment_id)
        sleep 3
        VIP_TICKET="LSJ-VIP-$(openssl rand -base64 12 | tr -dc 'A-Z0-9' | head -c 6)"
        curl -s -X PATCH \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "{\"body\":\"![](https://readme-typing-svg.demolab.com?font=Jersey+10&size=30&duration=4000&pause=99999&color=c0a000&vCenter=true&repeat=false&width=600&height=40&lines=VIP+Access+Granted.+Welcome+aboard.)\n\n\`\`\`\nVI-032 SECURE TERMINAL вЂ” L.S.J. LLC\nPromo code ..................... VERIFIED\nUpgrading passenger ${{ github.event.comment.user.login }} ...\nClearance level ................ в­ђ VIP GUEST\nAccess ......................... Island Parties В· Deck B В· Private Beach\nNew ticket ID .................. $VIP_TICKET\n\`\`\`\n\n---\n\nрџЊџ You have been upgraded on the manifest. See you at the party.\"}" \
          "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments/${VIP_COMMENT_ID}"
